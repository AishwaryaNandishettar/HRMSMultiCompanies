<!DOCTYPE html>
<html>
<head>
    <title>SMS Test</title>
</head>
<body>
    <h2>Test SMS Functionality</h2>
    
    <div>
        <h3>Test Direct SMS</h3>
        <input type="text" id="phoneNumber" placeholder="Enter phone number (e.g., 9876543210)" />
        <br><br>
        <button onclick="testSms()">Send Test SMS</button>
        <div id="smsResult"></div>
    </div>

    <div style="margin-top: 30px;">
        <h3>Test Status Update with SMS</h3>
        <input type="text" id="candidateId" placeholder="Candidate ID" />
        <br><br>
        <select id="status">
            <option value="Selected">Selected</option>
            <option value="Shortlisted">Shortlisted</option>
            <option value="Interview Stage">Interview Stage</option>
            <option value="Rejected">Rejected</option>
        </select>
        <br><br>
        <input type="text" id="email" placeholder="Email" value="test@example.com" />
        <br><br>
        <input type="text" id="phone" placeholder="Phone (e.g., 9876543210)" />
        <br><br>
        <textarea id="comments" placeholder="Comments">Test comment from HTML page</textarea>
        <br><br>
        <button onclick="testStatusUpdate()">Update Status & Send SMS</button>
        <div id="statusResult"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8082';
        
        async function testSms() {
            const phone = document.getElementById('phoneNumber').value;
            const resultDiv = document.getElementById('smsResult');
            
            if (!phone) {
                resultDiv.innerHTML = '<p style="color: red;">Please enter phone number</p>';
                return;
            }
            
            try {
                resultDiv.innerHTML = '<p>Sending test SMS...</p>';
                
                const response = await fetch(`${API_BASE}/api/jobs/test-sms`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phoneNumber: phone,
                        message: 'Test message from HTML page'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<p style="color: green;">✅ ${data.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ ${data.message}</p>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
        
        async function testStatusUpdate() {
            const candidateId = document.getElementById('candidateId').value;
            const status = document.getElementById('status').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const comments = document.getElementById('comments').value;
            const resultDiv = document.getElementById('statusResult');
            
            if (!candidateId || !email || !phone) {
                resultDiv.innerHTML = '<p style="color: red;">Please fill all fields</p>';
                return;
            }
            
            try {
                resultDiv.innerHTML = '<p>Updating status and sending SMS...</p>';
                
                const response = await fetch(`${API_BASE}/api/jobs/update-status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        candidateId: candidateId,
                        newStatus: status,
                        candidateEmail: email,
                        candidatePhone: phone,
                        comments: comments
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<p style="color: green;">✅ ${data.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ ${data.message}</p>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
