# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.debug=true


# Email Retry Configuration
spring.mail.properties.mail.smtp.retry.count=3
spring.mail.properties.mail.smtp.retry.delay=2000

# Email Template Configuration
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.mime.charset=UTF-8

# ===============================
# ASYNC CONFIGURATION
# ===============================
# Thread Pool for Async Email Processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-


# ===============================
# MEETING EMAIL CONFIGURATION
# ===============================
# Meeting Email Settings
meeting.email.from-name=HRMS Meeting System
meeting.email.from-address=aishwarya.n@omoikaneinnovations.com
meeting.email.reply-to=noreply@omoikaneinnovations.com
# Use localhost while the frontend is running locally. Update this when the app is deployed.
meeting.email.base-url=http://localhost:5176

# Reminder Settings (in minutes before meeting)
meeting.email.reminders.enabled=true
meeting.email.reminders.times=1440,60,15
meeting.email.reminders.batch-size=50

# Email Rate Limiting
meeting.email.rate-limit.enabled=true
meeting.email.rate-limit.max-per-minute=30
meeting.email.rate-limit.max-per-hour=500

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

# ===============================
# LIVEKIT SFU CONFIGURATION
