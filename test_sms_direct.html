<!DOCTYPE html>
<html>
<head>
    <title>Direct SMS Test</title>
</head>
<body>
    <h2>🧪 Direct SMS Service Test</h2>
    
    <div>
        <h3>Test SMS Service</h3>
        <input type="text" id="phoneNumber" placeholder="9606408912" value="9606408912" />
        <br><br>
        <button onclick="testSms()">🚀 Test SMS Service</button>
        <div id="result"></div>
    </div>

    <div style="margin-top: 30px;">
        <h3>Test Status Update</h3>
        <input type="text" id="candidateId" placeholder="69dca4e5cb1b3d2ca3677d38" value="69dca4e5cb1b3d2ca3677d38" />
        <br><br>
        <input type="text" id="email" placeholder="aishushettar95@gmail.com" value="aishushettar95@gmail.com" />
        <br><br>
        <input type="text" id="phone" placeholder="9606408912" value="9606408912" />
        <br><br>
        <textarea id="comments" placeholder="Test comments">Test SMS functionality</textarea>
        <br><br>
        <select id="status">
            <option value="Selected">Selected</option>
            <option value="Shortlisted">Shortlisted</option>
        </select>
        <br><br>
        <button onclick="testStatusUpdate()">📱 Test Status Update</button>
        <div id="statusResult"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8082';
        
        async function testSms() {
            const phone = document.getElementById('phoneNumber').value;
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = '<p>Testing SMS service...</p>';
                
                const response = await fetch(`${API_BASE}/api/jobs/test-sms`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phoneNumber: phone,
                        message: 'Test SMS from HTML'
                    })
                });
                
                const data = await response.json();
                console.log('SMS Test Response:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `<p style="color: green;">✅ ${data.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ ${data.message}</p>`;
                }
                
            } catch (error) {
                console.error('SMS Test Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
        
        async function testStatusUpdate() {
            const candidateId = document.getElementById('candidateId').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const comments = document.getElementById('comments').value;
            const status = document.getElementById('status').value;
            const resultDiv = document.getElementById('statusResult');
            
            try {
                resultDiv.innerHTML = '<p>Testing status update...</p>';
                
                const response = await fetch(`${API_BASE}/api/jobs/update-status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        candidateId: candidateId,
                        candidateEmail: email,
                        candidatePhone: phone,
                        comments: comments,
                        newStatus: status
                    })
                });
                
                const data = await response.json();
                console.log('Status Update Response:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `<p style="color: green;">✅ ${data.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ ${data.message}</p>`;
                }
                
            } catch (error) {
                console.error('Status Update Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
